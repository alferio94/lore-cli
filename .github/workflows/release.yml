name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semantic annotated tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release tags must match vX.Y.Z; got $TAG" >&2
            exit 1
          fi
          # actions/checkout may leave the tag name resolved to the peeled commit
          # on tag-triggered workflows. Fetch the tag ref explicitly before
          # enforcing annotated-tag semantics.
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          TYPE="$(git cat-file -t "refs/tags/${TAG}")"
          if [[ "$TYPE" != "tag" ]]; then
            echo "release tags must be annotated; got object type $TYPE" >&2
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run test gate
        run: go test ./...

  build:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
            binary_name: lore
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_name: lore
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_name: lore
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_name: lore
          - goos: windows
            goarch: amd64
            archive_ext: zip
            binary_name: lore.exe
          - goos: windows
            goarch: arm64
            archive_ext: zip
            binary_name: lore.exe
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release archive
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BINARY_NAME: ${{ matrix.binary_name }}
          TAG: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ARCHIVE="lore-cli_${TAG}_${GOOS}_${GOARCH}.${ARCHIVE_EXT}"
          BINARY_DIR="dist/${GOOS}_${GOARCH}"
          mkdir -p "$BINARY_DIR"
          go build -trimpath \
            -ldflags "-X github.com/alferio94/lore-cli/internal/version.Version=${TAG} -X github.com/alferio94/lore-cli/internal/version.Commit=${COMMIT} -X github.com/alferio94/lore-cli/internal/version.BuildDate=${BUILD_DATE}" \
            -o "$BINARY_DIR/${BINARY_NAME}" ./cmd/lore
          if [[ "$GOOS" == "windows" ]]; then
            zip -j "dist/${ARCHIVE}" "$BINARY_DIR/${BINARY_NAME}"
          else
            tar -C "$BINARY_DIR" -czf "dist/${ARCHIVE}" "$BINARY_NAME"
          fi

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true

      - name: Generate checksums and verify asset set
        working-directory: dist
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mapfile -t actual < <(find . -maxdepth 1 -type f \( -name 'lore-cli_*.tar.gz' -o -name 'lore-cli_*.zip' \) -printf '%f\n' | sort)
          expected=(
            "lore-cli_${TAG}_darwin_amd64.tar.gz"
            "lore-cli_${TAG}_darwin_arm64.tar.gz"
            "lore-cli_${TAG}_linux_amd64.tar.gz"
            "lore-cli_${TAG}_linux_arm64.tar.gz"
            "lore-cli_${TAG}_windows_amd64.zip"
            "lore-cli_${TAG}_windows_arm64.zip"
          )
          mapfile -t expected_sorted < <(printf '%s\n' "${expected[@]}" | sort)
          if ! diff -u <(printf '%s\n' "${expected_sorted[@]}") <(printf '%s\n' "${actual[@]}"); then
            echo "release asset set did not match expected filenames" >&2
            exit 1
          fi
          sha256sum "${expected_sorted[@]}" > SHA256SUMS
          if [[ $(wc -l < SHA256SUMS) -ne 6 ]]; then
            echo "expected SHA256SUMS to contain 6 entries" >&2
            exit 1
          fi
          for archive in "${expected_sorted[@]}"; do
            if ! grep -Fq "  ${archive}" SHA256SUMS; then
              echo "missing checksum for ${archive}" >&2
              exit 1
            fi
          done

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lore-cli_*.tar.gz
            dist/lore-cli_*.zip
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
